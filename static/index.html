<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyTools 视频下载工具</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="heading">
          <div>
            <p class="eyebrow">MyTools</p>
            <h1>视频下载工具</h1>
          </div>
          <div id="envBadge" class="badge">检查中</div>
        </div>

        <label class="field">
          <span>视频链接</span>
          <input id="urlInput" type="text" placeholder="粘贴视频链接或分享文本" autocomplete="off" />
        </label>

        <div class="grid">
          <label class="field">
            <span>登录状态</span>
            <select id="cookieSource">
              <option value="none">不使用登录状态</option>
              <option value="chrome">读取 Chrome 登录状态</option>
            </select>
          </label>

          <label class="field">
            <span>下载范围</span>
            <select id="downloadScope">
              <option value="single">仅下载当前视频</option>
              <option value="collection">下载整个合集/列表</option>
            </select>
          </label>
        </div>

        <div class="grid">
          <label class="field">
            <span>链接来源</span>
            <select id="platformHint" disabled>
              <option value="waiting">待识别</option>
              <option value="generic">通用链接</option>
              <option value="bilibili">哔哩哔哩</option>
              <option value="youtube">YouTube</option>
              <option value="xiaohongshu">小红书</option>
              <option value="douyin">抖音</option>
            </select>
          </label>

          <label class="field">
            <span>下载质量</span>
            <select id="quality">
              <option value="best">最高可用画质</option>
              <option value="60fps">优先 60 帧</option>
              <option value="2160p">2160P / 4K</option>
              <option value="1440p">1440P / 2K</option>
              <option value="1080p">1080P</option>
              <option value="720p">720P</option>
              <option value="480p">480P</option>
              <option value="360p">360P</option>
            </select>
          </label>
        </div>

        <label class="field">
          <span>上传压缩</span>
          <select id="compressionTarget">
            <option value="0">不压缩（保留原始大小）</option>
            <option value="50">约 50 MB</option>
            <option value="25">约 25 MB（推荐上传 GPT）</option>
            <option value="15">约 15 MB（更小，画质较低）</option>
          </select>
          <small class="hint">选择后会额外生成一个 720P H.264 小文件，原始视频仍会保留。</small>
        </label>

        <label class="field">
          <span>保存位置</span>
          <input id="outputDir" type="text" />
        </label>

        <div class="actions">
          <button id="probeBtn" type="button">检测链接</button>
          <button id="downloadBtn" type="button" class="primary">开始下载</button>
          <button id="cancelBtn" type="button" class="danger" disabled>停止任务</button>
        </div>

        <div class="local-compress">
          <div>
            <h2>压缩本地视频</h2>
            <p class="section-copy">选择电脑里的视频，压缩结果会保存到上面的“保存位置”，原文件不会改动。</p>
          </div>
          <label class="field">
            <span>本地视频文件</span>
            <input id="localVideoInput" type="file" accept="video/mp4,video/quicktime,video/x-m4v,video/x-matroska,video/webm,.mp4,.mov,.m4v,.mkv,.webm" />
          </label>
          <div class="grid">
            <label class="field">
              <span>目标大小</span>
              <select id="localCompressionTarget">
                <option value="50">约 50 MB</option>
                <option value="25" selected>约 25 MB（推荐上传 GPT）</option>
                <option value="15">约 15 MB（更小，画质较低）</option>
              </select>
            </label>
            <div class="local-action">
              <button id="compressLocalBtn" type="button" class="primary">压缩本地视频</button>
            </div>
          </div>
        </div>
      </section>

      <section class="panel result">
        <div class="result-head">
          <h2>状态</h2>
          <span id="jobState" class="state">空闲</span>
        </div>

        <div class="progress">
          <div id="progressBar"></div>
        </div>

        <dl id="details" class="details">
          <div>
            <dt>提示</dt>
            <dd id="message">可以粘贴链接下载，也可以选择本地视频直接压缩。</dd>
          </div>
          <div>
            <dt>标题</dt>
            <dd id="title">-</dd>
          </div>
          <div>
            <dt>保存文件</dt>
            <dd id="savedFile">-</dd>
          </div>
        </dl>

        <pre id="log" class="log"></pre>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
